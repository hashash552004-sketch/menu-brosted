<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منيو بروستد الزواق</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="logo-area">
        <img src="logo.jpg" alt="بروستد الزواق" class="logo" />
        <div class="site-title">
          <h1>منيو بروستد الزواق</h1>
          <span class="site-title-en">Broasted Al-Zawq Menu</span>
        </div>
      </div>
      <a href="admin.html" class="admin-link">🔐 لوحة التحكم</a>
    </div>
  </header>

  <main class="container">
    <!-- Filters -->
    <section class="filters">
      <input type="text" id="searchInput" placeholder="🔍 ابحث عن طبق..." />
      <select id="categoryFilter">
        <option value="">جميع الأقسام</option>
      </select>
    </section>

    <!-- Dishes grid -->
    <section class="dishes-grid" id="dishesGrid">
      <p class="loading">جاري التحميل...</p>
    </section>
  </main>

  <footer>
    <p>© 2026 منيو بروستد الزواق - جميع الحقوق محفوظة</p>
    <p style="margin-top:6px;color:#999;font-size:.8rem;">تم التطوير بواسطة المبرمج <strong>Abdullah Hashash</strong></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
