services:
  - type: web
    name: menu-brosted
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: menu-db
          property: connectionString

databases:
  - name: menu-db
    region: frankfurt
    plan: free
    ipAllowList: []
