<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منيو بروستد الزواق</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="logo-area">
        <img src="logo.jpg" alt="بروستد الزواق" class="logo" />
        <div class="site-title">
          <h1>بروستد الزواق</h1>
          <span class="site-title-en">Broasted Al-Zawq</span>
        </div>
      </div>
      <div class="header-actions">
        <a href="admin.html" class="admin-link" title="لوحة التحكم">🔐</a>
        <button id="cartToggle" class="cart-toggle">
          🛒 <span id="cartCount" class="cart-badge">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="all">كل الأطباق</button>
      <button class="tab" data-tab="popular">⭐ الأكثر طلبًا</button>
      <button class="tab" data-tab="favorites">❤️ المفضلة</button>
    </div>

    <section class="filters">
      <input type="text" id="searchInput" placeholder="🔍 ابحث عن طبق..." />
      <select id="categoryFilter">
        <option value="">جميع الأقسام</option>
      </select>
      <div class="price-filter">
        <label>أقصى سعر (ل.س)</label>
        <input type="number" id="priceMax" min="0" step="100" value="100000" placeholder="أقصى سعر" />
      </div>
    </section>

    <div class="dishes-grid" id="dishesGrid">
      <p class="loading">جاري التحميل...</p>
    </div>
  </main>

  <!-- Cart panel -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h3>🛒 سلة الطلبات</h3>
      <button id="cartClose" class="cart-close">✕</button>
    </div>
    <div class="cart-body" id="cartBody">
      <p class="cart-empty">السلة فارغة</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-total-row">
        <span>المجموع:</span>
        <span id="cartTotal">0</span>
      </div>
      <button class="btn btn-primary cart-action-btn" id="whatsappBtn">📱 طلب عبر واتساب</button>
      <button class="btn btn-success cart-action-btn" id="orderBtn">✅ إرسال الطلب</button>
      <button class="btn btn-secondary cart-action-btn" id="clearCartBtn">🗑️ تفريغ السلة</button>
    </div>
  </div>

  <!-- Order form modal -->
  <div class="modal-overlay" id="orderModal">
    <div class="modal">
      <h3>✅ تأكيد الطلب</h3>
      <form id="orderForm">
        <label>الاسم</label>
        <input type="text" id="orderName" required />
        <label>رقم الهاتف</label>
        <input type="tel" id="orderPhone" />
        <div class="payment-section">
          <label>طريقة الدفع</label>
          <div class="payment-options">
            <label class="payment-option active" data-method="cash">
              <input type="radio" name="payment" value="cash" checked /> 💵 عند الاستلام
            </label>
            <label class="payment-option" data-method="sham">
              <input type="radio" name="payment" value="sham" /> 💳 شام كاش
            </label>
          </div>
          <div class="payment-image-area" id="paymentImageArea">
            <img src="/payment.jpg" alt="شام كاش" id="paymentImage" />
            <p style="color:#888;font-size:.8rem;margin-top:6px;">حول المبلغ على الرقم أعلاه وأرسل صورة الإيصال</p>
          </div>
        </div>
        <label>ملاحظات</label>
        <textarea id="orderNotes"></textarea>
        <div id="orderSummary" style="margin:16px 0;padding:14px;background:#f5f5f0;border-radius:8px;font-size:.9rem;"></div>
        <div class="btn-row">
          <button type="button" class="btn btn-secondary" id="orderCancel">🔙 رجوع</button>
          <button type="submit" class="btn btn-success">إرسال الطلب</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Success modal -->
  <div class="modal-overlay" id="successModal">
    <div class="modal" style="text-align:center;">
      <h3>✅ تم إرسال الطلب بنجاح!</h3>
      <p style="margin:20px 0;font-size:1.1rem;">سيتم التواصل معك قريبًا</p>
      <button class="btn btn-primary" id="successClose">حسنًا</button>
    </div>
  </div>

  <footer>
    <p>© 2026 منيو بروستد الزواق - جميع الحقوق محفوظة</p>
    <p style="margin-top:6px;color:#999;font-size:.8rem;">تم التطوير بواسطة المبرمج <strong>Abdullah Hashash</strong></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
