<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الطلبات - بروستد الزواق</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="logo-area">
        <img src="logo.jpg" alt="بروستد الزواق" class="logo" />
        <div class="site-title">
          <h1>بروستد الزواق</h1>
          <span class="site-title-en">Broasted Al-Zawq</span>
        </div>
      </div>
      <div class="header-actions">
        <a href="admin.html" class="admin-link">📝 تعديل المنيو</a>
        <a href="index.html" class="admin-link">⬅ العودة</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="admin-login-section" id="loginSection">
      <h2>تسجيل الدخول - الطلبات</h2>
      <input type="password" id="passwordInput" placeholder="كلمة السر" />
      <button class="btn btn-primary" id="loginBtn">دخول</button>
      <p id="loginError" style="color:#c0392b;margin-top:10px;display:none;"></p>
    </section>

    <section class="admin-panel" id="ordersPanel" style="display:none;">
      <div class="admin-controls">
        <h2 style="flex:1;">📋 جميع الطلبات</h2>
        <button class="btn btn-primary" id="refreshBtn">🔄 تحديث</button>
        <button class="btn btn-secondary" id="logoutBtn">🚪 تسجيل الخروج</button>
      </div>
      <div id="ordersList"></div>
    </section>
  </main>

  <script src="admin-orders.js"></script>
</body>
</html>
